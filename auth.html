<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#111;
  padding:40px;
  border-radius:20px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  border-radius:20px;
  border:none;
  background:white;
  cursor:pointer;
}

.link {
  margin-top:10px;
  color:#aaa;
  cursor:pointer;
}

.warn { color:red; }
</style>
</head>

<body>

<div class="box">
  <h2 style="color:white;">로그인</h2>

  <input id="id" placeholder="아이디">
  <input id="pw" type="password" placeholder="비밀번호">

  <button onclick="login()">로그인</button>

  <div class="warn" id="warn"></div>

  <div class="link" onclick="goRegister()">회원가입</div>
</div>

<script>
function login(){
  let id = document.getElementById("id").value;
  let pw = document.getElementById("pw").value;

  let users = JSON.parse(localStorage.getItem("users")||"{}");

  if(!users[id]){
    warn.innerText = "존재하지 않는 계정";
    return;
  }

  if(users[id] !== pw){
    warn.innerText = "비밀번호 틀림";
    return;
  }

  localStorage.setItem("loginUser", id);
  alert("로그인 성공!");
  location.href = "/";
}

function goRegister(){
  location.href = "/auth/register";
}
</script>

</body>
</html>
