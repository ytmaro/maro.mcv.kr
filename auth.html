<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - MARO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 로그인 박스 */
.login-box {
  background:#111;
  padding:40px;
  border-radius:20px;
  width:300px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* 제목 */
.title {
  color:white;
  font-size:28px;
  margin-bottom:20px;
}

/* 입력창 */
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

/* 버튼 */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* 로그인 버튼 */
.login-btn {
  background:white;
  color:black;
}

/* 회원가입 */
.register {
  margin-top:15px;
  color:#aaa;
  cursor:pointer;
}
.register:hover {
  color:white;
}

/* 경고 */
.warn {
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
  <div class="title">MARO 로그인</div>

  <input id="id" placeholder="아이디">
  <input id="pw" type="password" placeholder="비밀번호">

  <button class="login-btn" onclick="login()">로그인</button>

  <div class="warn" id="warn"></div>

  <div class="register" onclick="goRegister()">회원가입</div>
</div>

<script>
function login(){
  let id = document.getElementById("id").value;
  let pw = document.getElementById("pw").value;

  if(!id || !pw){
    document.getElementById("warn").innerText = "아이디와 비밀번호를 입력하세요";
    return;
  }

  // 현재는 HTML만이라서 간단한 저장 방식
  localStorage.setItem("user", id);

  alert("로그인 성공!");
  location.href = "/";
}

function goRegister(){
  location.href = "/auth/register";
}
</script>

</body>
</html>
