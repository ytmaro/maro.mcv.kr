<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MARO</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; scroll-behavior:smooth; }

/* 상단 */
.top {
  height:60vh;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

.menu {
  position:absolute;
  top:20px;
  left:20px;
  display:flex;
  gap:10px;
}

.menu div {
  background:#222;
  color:white;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

.title { color:white; font-size:60px; animation:fadeIn 1.5s forwards; }
.desc { color:white; animation:fadeIn 1.5s forwards; animation-delay:0.8s; }

.fade {
  height:150px;
  background:linear-gradient(to bottom, black, white);
}

/* 카드 UI */
.card {
  background:white;
  border-radius:20px;
  padding:20px;
  margin:20px auto;
  width:80%;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 공지 */
.notice-title { font-size:30px; font-weight:bold; text-align:center; }

/* 게시판 */
.ask { padding:50px; text-align:center; }

input, textarea {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:1px solid #ccc;
  width:200px;
}

textarea { width:300px; height:80px; }

button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:black;
  color:white;
  cursor:pointer;
}

/* 댓글 */
.post {
  text-align:left;
  margin-top:10px;
}

.delete-btn {
  float:right;
  background:red;
}

/* 관리자 */
.admin {
  background:#111;
  color:white;
  min-height:100vh;
  padding:30px;
}

.card-dark {
  background:#222;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div id="main">

<div class="top" id="intro">
  <div class="menu">
    <div onclick="go('intro')">INTRO</div>
    <div onclick="go('notice')">NOTICE</div>
    <div onclick="go('board')">BOARD</div>
  </div>

  <div class="title">MARO</div>
  <div class="desc">마로에 대해 정보가 궁금하다면 아래로 내려보세요!</div>
</div>

<div class="fade"></div>

<!-- 공지 -->
<div id="notice">
  <div class="notice-title">공지</div>
  <div id="noticeList"></div>
</div>

<!-- 게시판 -->
<div class="ask" id="board">
  <h2>마로에게 질문하기</h2>

  <div>[ SafeBot 작동중 ]</div>

  <div id="inputArea">
    <input id="name" placeholder="이름">
    <textarea id="q" placeholder="질문"></textarea><br>
    <button onclick="add()">등록</button>
  </div>

  <div id="warn"></div>
  <div id="posts"></div>
</div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")||"[]");
let notices = JSON.parse(localStorage.getItem("notices")||"[]");

const badWords = ["씨발","ㅅㅂ","fuck","shit","병신","개새끼","죽어"];

function isBad(t){
  return badWords.some(w=>t.toLowerCase().includes(w));
}

function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* 댓글 */
function add(){
  let name = document.getElementById("name").value;
  let q = document.getElementById("q").value;

  if(isBad(name)||isBad(q)){
    warn.innerText="[SafeBot] 악성 댓글 감지";
    return;
  }

  posts.push({name,q});
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

function deletePost(i){
  posts.splice(i,1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

/* 렌더 */
function render(){
  document.getElementById("posts").innerHTML =
    posts.map((p,i)=>`
      <div class="card post">
        <button class="delete-btn" onclick="deletePost(${i})">삭제</button>
        <b>${p.name}</b><br>${p.q}
      </div>
    `).join("");

  document.getElementById("noticeList").innerHTML =
    notices.map(n=>`
      <div class="card">
        <h3>${n.title}</h3>
        <p>${n.text}</p>
      </div>
    `).join("");
}

render();

/* 관리자 */
if(location.search.includes("admin0816")){
  document.body.innerHTML=`
  <div class="admin">
    <h1>관리자</h1>

    <div class="card-dark">
      <h3>공지 추가</h3>
      <input id="nt" placeholder="제목"><br>
      <textarea id="nc" placeholder="내용"></textarea><br>
      <button onclick="addNotice()">추가</button>
    </div>

    <div class="card-dark">
      <h3>전체 삭제</h3>
      <button onclick="clearPosts()">게시글 삭제</button>
      <button onclick="clearNotice()">공지 삭제</button>
    </div>

    <div class="card-dark">
      <button onclick="location.href='/'">메인</button>
    </div>
  </div>
  `;
}

function addNotice(){
  let title = document.getElementById("nt").value;
  let text = document.getElementById("nc").value;

  notices.push({title,text});
  localStorage.setItem("notices", JSON.stringify(notices));
  alert("공지 추가됨");
}

function clearPosts(){
  localStorage.removeItem("posts");
}

function clearNotice(){
  localStorage.removeItem("notices");
}
</script>

</body>
</html>
