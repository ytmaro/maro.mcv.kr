<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MARO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
}

body {
    overflow-x: hidden;
}

/* 첫 화면 */
.section1 {
    height: 100vh;
    background: linear-gradient(to bottom, black 50%, white 50%);
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 그라데이션 경계 */
.section1::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 100%;
    height: 120px;
    background: linear-gradient(to bottom, rgba(0,0,0,1), rgba(255,255,255,1));
}

/* 텍스트 */
.center-text {
    text-align: center;
    z-index: 2;
}

.title {
    font-size: 80px;
    font-weight: bold;
    color: white;
    opacity: 0;
    animation: fadeIn 1s forwards;
}

.subtitle {
    font-size: 16px;
    color: white;
    margin-top: 10px;
    opacity: 0;
    animation: fadeIn 1s forwards;
    animation-delay: 1s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* 두번째 영역 */
.section2 {
    min-height: 100vh;
    background: white;
    padding: 50px;
}

/* 프로필 */
.profile {
    display: flex;
    align-items: center;
}

.profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid #0055ff;
}

.profile-text {
    margin-left: 20px;
}

.profile-text h1 {
    font-size: 40px;
}

.profile-text p {
    margin-top: 5px;
}

/* 카드 */
.card {
    margin-top: 20px;
    display: flex;
    align-items: center;
    background: #f5f5f5;
    padding: 15px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.02);
}

.card img {
    width: 60px;
    height: 60px;
    border-radius: 10px;
}

.card-text {
    margin-left: 15px;
}

.card-title {
    font-size: 20px;
    font-weight: bold;
}

.underline {
    text-decoration: underline;
}

.card-sub {
    font-size: 13px;
    color: gray;
}

/* 로딩 화면 */
.loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

.loading-box {
    background: white;
    padding: 30px 50px;
    border-radius: 20px;
    font-weight: bold;
}

</style>
</head>

<body>

<!-- 첫 화면 -->
<div class="section1">
    <div class="center-text">
        <div class="title">MARO</div>
        <div class="subtitle">마로에 대해 궁금하다면 스크롤 해보세요!</div>
    </div>
</div>

<!-- 두번째 -->
<div class="section2">

    <div class="profile">
        <img src="https://via.placeholder.com/120">
        <div class="profile-text">
            <h1>마로</h1>
            <p>이름 : 이**</p>
        </div>
    </div>

    <!-- 카드 1 -->
    <div class="card" onclick="goYoutube()">
        <img src="https://lh3.googleusercontent.com/Am6KVVxjUxnNW3DMFg-sQAi6x7QNxcKrmmnIBtipuvpxs2tQwfahqCnTD9E8jwVkuMdar4sB7Q=s26">
        <div class="card-text">
            <div class="card-title underline">Youtuber</div>
            <div class="card-sub">구독자 194명 유튜버</div>
        </div>
    </div>

    <!-- 카드 2 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1675495277087-10598bf7bcd1?w=1200&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fCVFRCU5NCU4NCVFQiVBMSU5QyVFQSVCNyVCOCVFQiU5RSU5OCVFQiVCMCU4RCUyMCVFQyVCRCU5NCVFQiU5MyU5Q3xlbnwwfHwwfHx8MA%3D%3D">
        <div class="card-text">
            <div class="card-title">HTML / Lua</div>
            <div class="card-sub">html , lua 코딩 1년차</div>
        </div>
    </div>

    <!-- 카드 3 -->
    <div class="card">
        <img src="https://i.namu.wiki/i/mOPJWA4cIxPvVinOGIaIiFQJcO1iO2YEpspsrtchK3T5O9k7MwFt8eSQKU4X6yzxiDMHQAd3LRHiiFPUaMb7tJpbY-Ai27qTcdH5fhAeY-F55gApj7Q-0pbiCQM13EeSQwT5pjhlZYmG5UCKEbIINA.webp">
        <div class="card-text">
            <div class="card-title">Rivals</div>
            <div class="card-sub">로블록스 라이벌 전 네메시스</div>
        </div>
    </div>

</div>

<!-- 로딩 -->
<div class="loading" id="loading">
    <div class="loading-box">
        서버에 연결중입니다...
    </div>
</div>

<script>
function goYoutube() {
    const loading = document.getElementById("loading");
    loading.style.display = "flex";

    setTimeout(() => {
        window.location.href = "https://youtube.com/@샤크마로";
    }, 800);
}
</script>

</body>
</html>
