<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MARO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(white,#eee);
  scroll-behavior:smooth;
}

/* 상단 */
.top {
  height:60vh;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* 메뉴 */
.menu {
  position:absolute;
  top:20px;
  left:20px;
  display:flex;
  gap:10px;
}
.menu div {
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color:white;
  padding:8px 15px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* 텍스트 */
.title { color:white; font-size:60px; }
.desc { color:white; }

/* 그라데이션 */
.fade {
  height:150px;
  background:linear-gradient(to bottom, black, white);
}

/* 카드 */
.card {
  background:white;
  border-radius:20px;
  padding:20px;
  margin:20px auto;
  width:85%;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover { transform:translateY(-5px); }

/* 공지 */
.notice-title {
  text-align:center;
  font-size:32px;
  font-weight:bold;
}

/* 게시판 */
.ask { text-align:center; padding:50px; }

input, textarea {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:1px solid #ccc;
}

textarea { width:300px; height:80px; }

button {
  padding:8px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:black;
  color:white;
  margin:3px;
}

/* 버튼 색상 */
.btn-delete { background:red; }
.btn-hide { background:orange; }
.btn-show { background:green; }

/* 상태 */
.hidden { opacity:0.3; }

/* 관리자 */
.admin {
  background:#111;
  color:white;
  min-height:100vh;
  padding:30px;
}

.admin-card {
  background:#222;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}
</style>
</head>

<body>

<div id="main">

<!-- 상단 -->
<div class="top" id="intro">
  <div class="menu">
    <div onclick="go('intro')">INTRO</div>
    <div onclick="go('notice')">NOTICE</div>
    <div onclick="go('board')">BOARD</div>
  </div>

  <h1 class="title">MARO</h1>
  <div class="desc">마로에 대해 궁금하다면 내려보세요</div>
</div>

<div class="fade"></div>

<!-- 공지 -->
<div id="notice">
  <div class="notice-title">공지</div>
  <div id="noticeList"></div>
</div>

<!-- 게시판 -->
<div class="ask" id="board">
  <h2>마로에게 질문하기</h2>
  <div>[ SafeBot 작동중 ]</div>

  <input id="name" placeholder="이름">
  <textarea id="q" placeholder="질문"></textarea><br>
  <button onclick="add()">등록</button>

  <div id="warn"></div>
  <div id="posts"></div>
</div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")||"[]");
let notices = JSON.parse(localStorage.getItem("notices")||"[]");

/* 욕 필터 */
const badWords = ["씨발","ㅅㅂ","fuck","shit","병신","개새끼","죽어","살인","자살"];

function isBad(t){
  return badWords.some(w=>t.toLowerCase().includes(w));
}

/* 이동 */
function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* 댓글 추가 */
function add(){
  let name = document.getElementById("name").value;
  let q = document.getElementById("q").value;

  if(isBad(name)||isBad(q)){
    warn.innerText="[SafeBot] 악성 댓글 감지";
    return;
  }

  posts.push({name,q,hidden:false});
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

/* 개별 관리 */
function del(i){
  posts.splice(i,1);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

function hide(i){
  posts[i].hidden = true;
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

function show(i){
  posts[i].hidden = false;
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

/* 렌더 */
function render(){
  document.getElementById("posts").innerHTML =
    posts.map((p,i)=>`
      <div class="card ${p.hidden?'hidden':''}">
        <b>${p.name}</b><br>${p.q}<br>
        <button class="btn-delete" onclick="del(${i})">삭제</button>
        <button class="btn-hide" onclick="hide(${i})">숨김</button>
        <button class="btn-show" onclick="show(${i})">복구</button>
      </div>
    `).join("");

  document.getElementById("noticeList").innerHTML =
    notices.map(n=>`
      <div class="card">
        <h3>${n.title}</h3>
        <p>${n.text}</p>
      </div>
    `).join("");
}

render();

/* 관리자 페이지 */
if(location.search.includes("admin0816")){
  document.body.innerHTML=`
  <div class="admin">
    <h1>🔥 관리자 패널</h1>

    <div class="admin-card">
      <h3>공지 추가</h3>
      <input id="nt"><br>
      <textarea id="nc"></textarea><br>
      <button onclick="addNotice()">추가</button>
    </div>

    <div class="admin-card">
      <h3>게시판 전체 관리</h3>
      <button onclick="clearPosts()">전체 삭제</button>
    </div>

    <div class="admin-card">
      <h3>공지 전체 삭제</h3>
      <button onclick="clearNotice()">삭제</button>
    </div>

    <div class="admin-card">
      <button onclick="location.href='/'">메인</button>
    </div>
  </div>
  `;
}

function addNotice(){
  let title=document.getElementById("nt").value;
  let text=document.getElementById("nc").value;
  notices.push({title,text});
  localStorage.setItem("notices", JSON.stringify(notices));
}

function clearPosts(){ localStorage.removeItem("posts"); }
function clearNotice(){ localStorage.removeItem("notices"); }

</script>

</body>
</html>
