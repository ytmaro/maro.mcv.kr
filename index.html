<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MARO</title>
  <style>
    body {
      margin: 0;
      overflow-x: hidden;
    }

    .container {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to right, black 50%, white 50%);
    }

    #maro-text {
      position: absolute;
      top: 50%;
      left: 25%;
      transform: translate(-50%, -50%);
      font-size: 8rem;
      font-weight: bold;
      color: white;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    #scroll-text {
      position: absolute;
      top: 70%;
      left: 25%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      color: white;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      transition-delay: 1s;
    }

    .profile-container {
      display: none;
      position: absolute;
      top: 50%;
      right: 25%;
      transform: translate(50%, -50%);
      align-items: center;
    }

    #profile-pic {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 5px solid darkblue;
    }

    #name {
      margin-left: 50px;
      font-size: 3rem;
      font-weight: bold;
    }

    #name-details {
      margin-top: 10px;
      font-size: 1.5rem;
    }

    .rectangles {
      display: none;
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
    }

    .rectangle {
      width: 300px;
      height: 150px;
      border-radius: 20px;
      border: 2px solid darkblue;
      margin: 20px;
      display: flex;
      align-items: center;
    }

    .rectangle img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 20px;
    }

    .rectangle-text {
      display: flex;
      flex-direction: column;
    }

    .rectangle-title {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .rectangle-subtitle {
      font-size: 1rem;
    }

    #youtube-link {
      color: blue;
      text-decoration: underline;
    }
  </style>
  <script>
    window.addEventListener('scroll', () => {
      const scrollPosition = window.scrollY;

      if (scrollPosition > window.innerHeight / 2) {
        document.getElementById('profile-container').style.display = 'flex';
        document.getElementById('rectangles').style.display = 'flex';
      } else {
        document.getElementById('profile-container').style.display = 'none';
        document.getElementById('rectangles').style.display = 'none';
      }
    });

    window.onload = () => {
      document.getElementById('maro-text').style.opacity = 1;
      document.getElementById('scroll-text').style.opacity = 1;
    };
  </script>
</head>
<body>
  <div class="container">
    <div id="maro-text">MARO</div>
    <div id="scroll-text">마로에 대해 궁금하다면 스크롤 해보세요!</div>
  </div>

  <div class="profile-container" id="profile-container">
    <img src="profile_pic.jpg" alt="프로필 사진" id="profile-pic">
    <div id="name">마로</div>
    <div id="name-details">이**</div>
  </div>

  <div class="rectangles" id="rectangles">
    <div class="rectangle">
      <img src="youtube_logo.png" alt="유튜브 로고">
      <div class="rectangle-text">
        <div class="rectangle-title"><a href="youtube.com/@샤크마로" id="youtube-link">Youtuber</a></div>
        <div class="rectangle-subtitle">구독자 194명 유튜버</div>
      </div>
    </div>
    <div class="rectangle">
      <img src="coding_icon.png" alt="코딩 아이콘">
      <div class="rectangle-text">
        <div class="rectangle-title">HTML / Lua</div>
        <div class="rectangle-subtitle">html , lua 코딩 1년차</div>
      </div>
    </div>
    <div class="rectangle">
      <img src="roblox_logo.png" alt="로블록스 로고">
      <div class="rectangle-text">
        <div class="rectangle-title">Rivals</div>
        <div class="rectangle-subtitle">로블록스 라이벌 전 네메시스</div>
      </div>
    </div>
  </div>
</body>
</html>
